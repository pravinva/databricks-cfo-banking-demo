<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detailed Reference Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy:#1B3139;
      --cyan:#00A8E1;
      --lava:#FF3621;
      --ink:#102028;
      --line:#d8e3e8;
      --surface:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Barlow",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(960px 380px at 92% -10%, rgba(0,168,225,.15), transparent 60%),
        radial-gradient(700px 320px at -3% -3%, rgba(255,54,33,.11), transparent 58%),
        linear-gradient(180deg, #f2f8fb 0%, #edf4f7 100%);
    }
    .container{width:min(1200px,94vw);margin:22px auto}
    .hero{
      background:linear-gradient(130deg, #111f26 0%, var(--navy) 56%, #235063 100%);
      color:#fff;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 18px 34px rgba(19,35,43,.23);
      padding:22px;
    }
    h1{margin:0;font-size:clamp(1.3rem,2.2vw,1.85rem)}
    .sub{margin-top:8px;color:#d7eaf2}
    .actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      text-decoration:none;
      border:1px solid rgba(255,255,255,.36);
      border-radius:10px;
      padding:9px 12px;
      color:#fff;
      font-weight:600;
      background:rgba(255,255,255,.1);
    }
    .btn:hover{background:rgba(255,255,255,.18)}
    .panel{
      margin-top:14px;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 8px 18px rgba(20,40,50,.07);
      padding:14px;
    }
    img{width:100%;height:auto;border-radius:10px;border:1px solid #ccdbe2}
    .meta{margin-top:8px;color:#5a707a;font-size:.88rem}
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Detailed Banking Treasury + CFO Architecture</h1>
      <p class="sub">Expanded implementation view showing ingestion, feature engineering, training, inference, and consumption layers.</p>
      <div class="actions">
        <a class="btn" href="./index.html">Back to Documentation Hub</a>
        <a class="btn" href="./documentation_index.html">Open Documentation Index</a>
      </div>
    </section>
    <section class="panel">
      <img src="./images/reference_architecture_detailed.png" alt="Detailed Databricks banking treasury and CFO architecture diagram" />
      <p class="meta">Tip: open image in a new tab to zoom for section-level labels.</p>
    </section>
  </main>
</body>
</html>
